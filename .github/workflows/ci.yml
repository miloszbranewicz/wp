name: CI

on:
  push:
  pull_request:
    branches: [master, main]

jobs:
  php-lint:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "*/node_modules/*" -not -path "*/dist/*" | xargs php -l

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
